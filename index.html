  :root {
    --primary: #2563eb;
    --primary-light: #dbeafe;
    --accent: #f59e0b;
    --bg: #f8fafc;

    --text: #1e293b;
    --text-light: #64748b;
    --success: #10b981;
    --border: #e2e8f0;

  body {

    padding-bottom: 100px;
  }
  .hero {

    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {

  .hero h1 { font-size: 28px; margin-bottom: 8px; position: relative; }
  .hero p { font-size: 15px; opacity: 0.9; position: relative; }
  .hero .trip-info {
    display: flex; justify-content: center; gap: 20px; margin-top: 15px;
    font-size: 13px; opacity: 0.85; position: relative;

  }
  .hero .trip-info span { display: flex; align-items: center; gap: 4px; }

  .container { max-width: 800px; margin: 0 auto; padding: 0 16px; }

  .progress-bar {
    background: white;
    border-radius: 16px;
    margin: -20px 16px 20px;
    padding: 16px 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    position: relative;
    z-index: 10;
    max-width: 800px;
    margin-left: auto;
    margin-right: auto;
  }
  .progress-bar .label { font-size: 14px; color: var(--text-light); margin-bottom: 8px; }
  .progress-bar .bar-track {
    height: 8px; background: #e2e8f0; border-radius: 4px; overflow: hidden;
  }
  .progress-bar .bar-fill {
    height: 100%; background: linear-gradient(90deg, var(--primary), var(--success));

  }
  .progress-bar .count { font-size: 13px; color: var(--text-light); margin-top: 6px; text-align: right; }

  .night-section {
    margin: 24px auto;
    max-width: 800px;
    padding: 0 16px;
  }
  .night-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 16px;
  }
  .night-badge {
    background: var(--primary);
    color: white;
    width: 48px; height: 48px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700;
    flex-shrink: 0;
  }
  .night-title h2 { font-size: 20px; font-weight: 700; }
  .night-title .date { font-size: 13px; color: var(--text-light); }

  .hotel-card {
    background: var(--card-bg);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 14px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    border: 2px solid transparent;
    transition: all 0.3s ease;
    cursor: pointer;
  }
  .hotel-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.1); transform: translateY(-2px); }
  .hotel-card.selected {
    border-color: var(--selected-border);
    background: var(--selected-bg);
  }
  .hotel-card.selected .select-btn {
    background: var(--success);
    color: white;
  }
  .hotel-card.alt { opacity: 0.85; }
  .hotel-card.alt:hover { opacity: 1; }

  .hotel-images {
    display: flex;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    height: 200px;
  }
  .hotel-images::-webkit-scrollbar { display: none; }
  .hotel-images img {
    width: 100%;
    min-width: 100%;
    height: 200px;
    object-fit: cover;
    scroll-snap-align: start;
    flex-shrink: 0;
  }
  .hotel-images .placeholder {
    width: 100%;
    min-width: 100%;
    height: 200px;
    background: linear-gradient(135deg, #e2e8f0, #cbd5e1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    flex-shrink: 0;
  }
  .img-dots {
    display: flex; justify-content: center; gap: 4px;
    padding: 6px 0;
  }
  .img-dots .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #cbd5e1;
  }
  .img-dots .dot.active { background: var(--primary); }

  .hotel-info { padding: 16px; }
  .hotel-name-row {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 8px;
  }
  .hotel-name { font-size: 18px; font-weight: 700; flex: 1; }
  .hotel-badge-tag {
    background: var(--accent);
    color: white;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
    white-space: nowrap;
    margin-left: 8px;

  }
  .hotel-brand { font-size: 13px; color: var(--text-light); margin-bottom: 10px; }
  .hotel-price {
    font-size: 22px; font-weight: 800; color: var(--primary);

  .hotel-price .unit { font-size: 13px; font-weight: 400; color: var(--text-light); }
  .hotel-price .rmb { font-size: 13px; color: var(--text-light); font-weight: 400; margin-left: 6px; }

  .hotel-features {
    display: flex; flex-wrap: wrap; gap: 6px;

  .feature-tag {
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 20px;
    background: #f1f5f9;
    color: var(--text-light);

  .hotel-desc {

    color: var(--text-light);

    line-height: 1.7;

    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    border-top: 1px solid var(--border);

    border-radius: 12px;
    padding: 12px 16px;
    margin: 12px 0;
    font-size: 13px;
    color: #92400e;

  .summary-float {

    border-top: 1px solid var(--border);
    padding: 12px 20px;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: space-between;

  .summary-float .info { font-size: 14px; }
  .summary-float .info strong { color: var(--primary); }
  .summary-btn {
    background: var(--primary);
    color: white;
    border: none;
    padding: 10px 24px;
    border-radius: 25px;
    font-size: 14px;
    font-weight: 600;

  .summary-btn:hover { background: #1d4ed8; }
  .summary-btn:disabled { background: #94a3b8; cursor: not-allowed; }

    top: 0; left: 0; right: 0; bottom: 0;

    z-index: 2000;
    align-items: flex-end;
    justify-content: center;

  .summary-content {
    background: white;
    border-radius: 20px 20px 0 0;
    padding: 24px 20px 40px;
    width: 100%;

  .summary-content h3 {

  .summary-item {

    padding: 12px 0;

  .summary-total {

    border-radius: 12px;

    cursor: pointer;

  .close-modal {

    top: 16px; right: 16px;
    background: none; border: none;
    font-size: 24px; cursor: pointer; color: var(--text-light);
  }

</style>
</head>

// Selection state
let selections = {};
try {
  const saved = localStorage.getItem('nz_hotel_selections');
  if (saved) selections = JSON.parse(saved);
} catch(e) {}

function saveSelections() {
  localStorage.setItem('nz_hotel_selections', JSON.stringify(selections));
  updateProgress();
}

function selectHotel(night, optionIdx) {
  if (selections[night] === optionIdx) {
    delete selections[night];
  } else {
    selections[night] = optionIdx;
  }
  // If night 7 is linked to night 8
  if (night === 7) {
    if (selections[7] !== undefined) selections[8] = selections[7];
    else delete selections[8];
  }
  saveSelections();
  renderAll();
}

function updateProgress() {
  const total = 9;
  const selected = Object.keys(selections).length;
  const pct = Math.round((selected / total) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressCount').textContent = `已选 ${selected}/${total} 晚`;
  document.getElementById('floatCount').textContent = selected;

  let totalCost = 0;
  HOTELS.forEach(h => {
    if (h.linkedTo) return;
    const sel = selections[h.night];
    if (sel !== undefined && h.options[sel]) {
      const nights = h.night === 7 ? 2 : 1;
      totalCost += h.options[sel].price * 2 * nights;
    }
  });
  document.getElementById('floatTotal').textContent = 'NZ$' + totalCost.toLocaleString();
}

function renderAll() {
  const container = document.getElementById('hotelSections');
  container.innerHTML = '';

  HOTELS.forEach(h => {
    const section = document.createElement('div');
    section.className = 'night-section';

    // Night header
    let titleExtra = h.subtitle ? `<span style="font-size:13px;color:var(--text-light);margin-left:8px;">${h.subtitle}</span>` : '';
    section.innerHTML = `
      <div class="night-header">
        <div class="night-badge">第${h.night}晚</div>
        <div class="night-title">
          <h2>${h.city} ${h.cityEn} ${titleExtra}</h2>
          <div class="date">📅 ${h.date}</div>
        </div>
      </div>
    `;

    if (h.warn) {
      section.innerHTML += `<div class="warning-box">${h.warn}</div>`;
    }

    // Linked night (same hotel as previous)
    if (h.linkedTo) {
      const linkedSel = selections[h.linkedTo];
      const linkedHotel = linkedSel !== undefined ? HOTELS.find(x => x.night === h.linkedTo).options[linkedSel] : null;
      section.innerHTML += `
        <div style="background:var(--primary-light);padding:16px;border-radius:12px;text-align:center;font-size:14px;">
          ${linkedHotel
            ? `✅ 和第 ${h.linkedTo} 晚同一家：<strong>${linkedHotel.name}</strong>（连住 2 晚）`
            : '⬆️ 和第 7 晚住同一家酒店（选了第 7 晚自动同步）'
          }
        </div>
      `;
      container.appendChild(section);
      return;
    }

    // Hotel cards
    h.options.forEach((opt, idx) => {
      const isSelected = selections[h.night] === idx;
      const card = document.createElement('div');
      card.className = `hotel-card ${isSelected ? 'selected' : ''} ${idx > 0 ? 'alt' : ''}`;

      // Images
      let imageHTML = '';
      if (opt.images && opt.images.length > 0) {
        const imgs = opt.images.map(src => `<img src="${src}" alt="${opt.name}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=placeholder>🏨</div>'">`).join('');
        imageHTML = `<div class="hotel-images">${imgs}</div>`;
      } else {
        const cityEmojis = {'奥克兰':'🌆','罗托鲁瓦':'♨️','陶波':'🌊','惠灵顿':'⚡','蒂卡波湖':'⭐','库克山':'🏔️','皇后镇':'🎿','瓦纳卡':'🏞️'};
        const emoji = cityEmojis[h.city] || '🏨';
        imageHTML = `<div class="hotel-images"><div class="placeholder">${emoji}</div></div>`;
      }

      const featHTML = opt.features.map((f, i) =>
        `<span class="feature-tag ${i === 0 ? 'highlight' : ''}">${f}</span>`
      ).join('');

      const tag = opt.recommended
        ? '<span class="hotel-badge-tag">⭐ 推荐</span>'
        : '<span class="hotel-badge-tag alt-tag">备选</span>';

      card.innerHTML = `
        ${imageHTML}
        <div class="hotel-info">
          <div class="hotel-name-row">
            <div class="hotel-name">${opt.name} ${tag}</div>
          </div>
          <div style="font-size:13px;color:var(--text-light);margin-bottom:2px;">${opt.nameCn}</div>
          <div class="hotel-brand">${opt.brand}</div>
          <div class="hotel-price">
            ${opt.priceRange} <span class="unit">/间/晚</span>
            <span class="rmb">≈ ${opt.rmb}</span>
          </div>
          <div class="hotel-features">${featHTML}</div>
          <div class="hotel-desc">${opt.desc}</div>
          <div class="hotel-links">
            <a href="${opt.url}" target="_blank" class="hotel-link">🔗 官网</a>
            <a href="${opt.booking}" target="_blank" class="hotel-link">📖 Booking</a>
          </div>
        </div>
        <button class="select-btn" onclick="event.stopPropagation(); selectHotel(${h.night}, ${idx})">
          ${isSelected ? '✅ 已选择' : '👆 选这家'}
        </button>
      `;

      card.addEventListener('click', () => selectHotel(h.night, idx));
      section.appendChild(card);
    });

    container.appendChild(section);
  });

  updateProgress();
}

function showSummary() {
  const modal = document.getElementById('summaryModal');
  const list = document.getElementById('summaryList');
  list.innerHTML = '';
  let total = 0;

  HOTELS.forEach(h => {
    const sel = selections[h.night];
    const item = document.createElement('div');
    item.className = 'summary-item';

    if (h.linkedTo) {
      const linkedSel = selections[h.linkedTo];
      const hotel = linkedSel !== undefined ? HOTELS.find(x => x.night === h.linkedTo).options[linkedSel] : null;
      item.innerHTML = `
        <span class="night-label">第${h.night}晚 · ${h.city}</span>
        <span class="hotel-choice">${hotel ? '↕️ 同上' : '<span class="not-selected">未选</span>'}</span>
      `;
    } else if (sel !== undefined && h.options[sel]) {
      const opt = h.options[sel];
      const nights = h.night === 7 ? 2 : 1;
      total += opt.price * 2 * nights;
      item.innerHTML = `
        <span class="night-label">第${h.night}晚 · ${h.city}</span>
        <span class="hotel-choice">${opt.name}<br><small style="color:var(--primary)">${opt.priceRange}/间</small></span>
      `;
    } else {
      item.innerHTML = `
        <span class="night-label">第${h.night}晚 · ${h.city}</span>
        <span class="not-selected">未选择</span>
      `;
    }
    list.appendChild(item);
  });

  document.getElementById('summaryTotal').textContent = 'NZ$' + total.toLocaleString();
  document.getElementById('summaryPerPerson').textContent = 'NZ$' + Math.round(total / 4).toLocaleString() + ' (≈¥' + Math.round(total / 4 * 4.4).toLocaleString() + ')';
  modal.classList.add('show');
}

function hideSummary() {
  document.getElementById('summaryModal').classList.remove('show');
}

function copySummary() {
  let text = '🏨 新西兰住宿方案\n4/30-5/9 · 4人2间房\n\n';
  let total = 0;

  HOTELS.forEach(h => {
    const sel = selections[h.night];
    if (h.linkedTo) {
      const linkedSel = selections[h.linkedTo];
      const hotel = linkedSel !== undefined ? HOTELS.find(x => x.night === h.linkedTo).options[linkedSel] : null;
      text += `第${h.night}晚 ${h.date} ${h.city}：${hotel ? '同上 ↕️' : '未选'}\n`;
    } else if (sel !== undefined && h.options[sel]) {
      const opt = h.options[sel];
      const nights = h.night === 7 ? 2 : 1;
      total += opt.price * 2 * nights;
      text += `第${h.night}晚 ${h.date} ${h.city}：${opt.name} (${opt.priceRange}/间)\n`;
    } else {
      text += `第${h.night}晚 ${h.date} ${h.city}：未选\n`;
    }
  });

  text += `\n💰 总价（2间×9晚）：NZ$${total.toLocaleString()}`;
  text += `\n👤 人均：NZ$${Math.round(total/4).toLocaleString()} ≈ ¥${Math.round(total/4*4.4).toLocaleString()}`;

  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = '✅ 已复制！发给姐妹们吧';
      setTimeout(() => { btn.textContent = '📋 复制方案发给大家'; }, 2000);
    });
  } else {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    const btn = document.querySelector('.copy-btn');
    btn.textContent = '✅ 已复制！';
    setTimeout(() => { btn.textContent = '📋 复制方案发给大家'; }, 2000);
  }
}

// Close modal on backdrop click
document.getElementById('summaryModal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('summaryModal')) hideSummary();
});

// Initial render
renderAll();
</script>
